<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LMS Admin Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loginPage" class="center">
  <div class="card">
    <h2>Admin Login</h2>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="dashboard" class="hidden container">
  <h1>LMS Admin Panel</h1>

  <div class="grid">
    <div class="card">
      <h3>Add Course</h3>
      <input id="courseName" placeholder="Course Name" />
      <input id="courseLink" placeholder="YouTube Link" />
      <button onclick="addCourse()">Add</button>
    </div>

    <div class="card">
      <h3>Add Instructor</h3>
      <input id="instructorName" placeholder="Name" />
      <input id="instructorEmail" placeholder="Email" />
      <input id="instructorPhone" placeholder="Phone" />
      <input id="instructorExpertise" placeholder="Expertise" />
      <input id="instructorBio" placeholder="Short Bio" />
      <button onclick="addInstructor()">Add</button>
    </div>

    <div class="card">
      <h3>Add Notification</h3>
      <input id="notificationText" placeholder="Notification" />
      <button onclick="addNotification()">Add</button>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Courses</h3>
      <div id="courseList" class="list"></div>
    </div>

    <div class="card">
      <h3>Instructors</h3>
      <div id="instructorList" class="list"></div>
    </div>

    <div class="card">
      <h3>Notifications</h3>
      <ul id="notificationList"></ul>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
